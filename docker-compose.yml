services:
  postgres:
    image: postgres:16-alpine
    container_name: jewelry-invoicing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: jewelry_invoicing
      POSTGRES_USER: invoicing
      POSTGRES_PASSWORD: invoicing
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoicing -d jewelry_invoicing"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
