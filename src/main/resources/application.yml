spring:
  application:
    name: jewelry-invoicing
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/jewelry_invoicing}
    username: ${DB_USER:invoicing}
    password: ${DB_PASSWORD:invoicing}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
        default_batch_fetch_size: 50
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    org.hibernate.SQL: INFO
